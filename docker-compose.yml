name: notoria

services:
  postgres:
    image: postgres:16-alpine
    container_name: notoria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: notoria
      POSTGRES_PASSWORD: notoria
      POSTGRES_DB: notoria
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
